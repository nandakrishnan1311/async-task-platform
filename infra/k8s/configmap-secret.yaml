apiVersion: v1
kind: ConfigMap
metadata:
  name: taskflow-config
  namespace: taskflow
data:
  PORT: "5000"
  JWT_EXPIRES_IN: "7d"
  FRONTEND_URL: "http://taskflow-frontend-service"
  REDIS_URL: "redis://taskflow-redis-service:6379"

---
apiVersion: v1
kind: Secret
metadata:
  name: taskflow-secrets
  namespace: taskflow
type: Opaque
stringData:
  MONGO_URI: "mongodb://admin:password123@taskflow-mongodb-service:27017/taskdb?authSource=admin"
  JWT_SECRET: "your-super-secret-jwt-key-change-in-production"
  MONGO_ROOT_PASSWORD: "password123"
